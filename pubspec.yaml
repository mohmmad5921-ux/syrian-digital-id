name: syrian_digital_id
description: "الهوية الرقمية السورية - Syrian Digital Identity"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  dio: ^5.4.3+1
  flutter_secure_storage: ^9.2.4
  camera: ^0.11.1
  flutter_nfc_kit: ^3.5.2
  qr_flutter: ^4.1.0
  smooth_page_indicator: ^1.2.0+3
  flutter_svg: ^2.0.16
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
